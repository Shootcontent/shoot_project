<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking Cancelled — SHOOT. Studios</title>
  <link rel="icon" href="/assets/images/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,600;0,700;0,900;1,900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Montserrat', -apple-system, sans-serif;
      background: #0a0a0a; color: #fff;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 20px;
    }
    .logo { margin-bottom: 48px; }
    .logo img { height: 40px; width: auto; filter: brightness(0) invert(1); }
    .card {
      background: #111;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 480px; width: 100%;
      text-align: center;
    }
    .icon {
      width: 76px; height: 76px; border-radius: 50%;
      background: rgba(239,68,68,0.1);
      border: 2px solid #ef4444;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px;
    }
    .title { font-size: 26px; font-weight: 900; font-style: italic; letter-spacing: -0.02em; margin-bottom: 14px; }
    .sub { font-size: 14px; color: rgba(255,255,255,0.6); line-height: 1.7; margin-bottom: 32px; }
    .notice {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px; padding: 14px 16px;
      font-size: 12px; color: rgba(255,255,255,0.5);
      margin-bottom: 32px; line-height: 1.6;
    }
    .btn-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn {
      display: inline-block;
      padding: 14px 30px;
      border-radius: 8px;
      font-family: inherit; font-size: 14px; font-weight: 700;
      cursor: pointer; text-decoration: none; border: none;
      transition: background 0.2s;
    }
    .btn-primary { background: #fff; color: #000; }
    .btn-primary:hover { background: #e0e0e0; }
    .btn-outline { background: transparent; color: #fff; border: 1.5px solid rgba(255,255,255,0.25); }
    .btn-outline:hover { border-color: #fff; }
  </style>
</head>
<body>

<div class="logo">
  <a href="/"><img src="/assets/images/logo.png" alt="SHOOT. Studios"></a>
</div>

<div class="card">
  <div class="icon">
    <svg width="34" height="34" viewBox="0 0 34 34" fill="none" stroke="#ef4444" stroke-width="2.5">
      <circle cx="17" cy="17" r="14"/>
      <path d="M11 11l12 12M23 11L11 23"/>
    </svg>
  </div>

  <div class="title" id="page-title">Payment Cancelled</div>
  <div class="sub" id="page-sub">No charge was made to your card. Your slot hold has been released so others can book.</div>

  <div class="notice">If you experienced a payment error, please try again. If the issue persists, contact us on WhatsApp and we'll assist you manually.</div>

  <div class="btn-row">
    <a href="/" class="btn btn-primary">Try Again</a>
    <a href="https://wa.me/27609948107" target="_blank" class="btn btn-outline">Contact Us</a>
  </div>
</div>

<script>
  const params    = new URLSearchParams(window.location.search);
  const bookingId = params.get('bookingId');
  const lockToken = params.get('lockToken');
  const reason    = params.get('reason');

  if (reason === 'failed') {
    document.getElementById('page-title').textContent = 'Payment Failed';
    document.getElementById('page-sub').textContent   =
      'Your payment was not processed successfully. No charge was made. Please try again or use a different card.';
  }

  // Release the slot lock so availability is restored immediately
  if (bookingId && lockToken) {
    fetch('/api/release-slot', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ bookingId, lockToken }),
    }).catch(() => {});  // fire-and-forget — lock expires anyway after 10 min
  }
</script>
</body>
</html>
